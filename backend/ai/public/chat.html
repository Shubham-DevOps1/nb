<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TalentIQ Chat</title>
<style>
  :root {
    --bg: #F4F3EF; --surface: #FFFFFF; --ink: #1E2420; --ink-muted: #5B655F;
    --line: #DCD8CF; --accent: #1F6F5C; --accent-soft: #D8E8E2; --accent-warm: #A5651F;
    --user-bubble: #1F6F5C; --user-text: #FFFFFF;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12100E; --surface: #182420; --ink: #ECEAE4; --ink-muted: #9AA6A0;
      --line: #2B3A34; --accent: #4FBBA0; --accent-soft: #1F3A32; --accent-warm: #E0A458;
      --user-bubble: #2A7D67; --user-text: #FFFFFF;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--ink); }
  .app { max-width: 760px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1rem 1.25rem 0.85rem; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 1.15rem; margin: 0 0 0.2rem; }
  header p { font-size: 0.82rem; color: var(--ink-muted); margin: 0; }
  #session { font-size: 0.7rem; color: var(--ink-muted); margin-top: 0.4rem; font-family: monospace; }

  #messages { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.9rem; }
  .msg { max-width: 82%; padding: 0.6rem 0.85rem; border-radius: 10px; font-size: 0.92rem; line-height: 1.45; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 3px; }
  .msg.bot { align-self: flex-start; background: var(--surface); border: 1px solid var(--line); border-bottom-left-radius: 3px; }
  .msg.error { align-self: flex-start; background: #F6DCDA; color: #7A2320; border: 1px solid #E0A9A4; }
  .tool-badge { display: inline-block; font-size: 0.65rem; font-family: monospace; color: var(--accent); background: var(--accent-soft); padding: 0.1rem 0.4rem; border-radius: 3px; margin-bottom: 0.35rem; }

  .cards { margin-top: 0.6rem; display: flex; flex-direction: column; gap: 0.45rem; }
  .card { border: 1px solid var(--line); border-radius: 6px; padding: 0.5rem 0.65rem; font-size: 0.82rem; background: var(--bg); }
  .card .name { font-weight: 600; }
  .card .meta { color: var(--ink-muted); font-size: 0.76rem; margin-top: 0.15rem; }

  .pending { align-self: flex-start; color: var(--ink-muted); font-size: 0.85rem; font-style: italic; }

  form#composer { display: flex; gap: 0.5rem; padding: 0.85rem 1.25rem; border-top: 1px solid var(--line); align-items: center; }
  #fileName { font-size: 0.72rem; color: var(--accent); font-family: monospace; }
  input[type=text] {
    flex: 1; padding: 0.6rem 0.8rem; border-radius: 8px; border: 1px solid var(--line);
    background: var(--surface); color: var(--ink); font-size: 0.92rem;
  }
  input[type=text]:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button, label.attach {
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    border-radius: 8px; padding: 0.6rem 0.8rem; cursor: pointer; font-size: 0.9rem;
  }
  button.primary { background: var(--accent); color: #fff; border: none; }
  button:disabled { opacity: 0.5; cursor: default; }
  label.attach:focus-within { outline: 2px solid var(--accent); }
  input[type=file] { display: none; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>TalentIQ Chat</h1>
    <p>Ask about your workforce, or attach a client requirement document.</p>
    <div id="session"></div>
  </header>

  <div id="messages"></div>

  <form id="composer">
    <label class="attach" title="Attach a requirement PDF">
      📎<input type="file" id="fileInput" accept="application/pdf">
    </label>
    <span id="fileName"></span>
    <input type="text" id="messageInput" placeholder="e.g. Who has AWS Lambda experience?" autocomplete="off">
    <button type="submit" class="primary" id="sendBtn">Send</button>
  </form>
</div>

<script>
  const SESSION_KEY = 'talentiq_chat_session_id';
  let sessionId = localStorage.getItem(SESSION_KEY) || null;

  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('composer');
  const input = document.getElementById('messageInput');
  const fileInput = document.getElementById('fileInput');
  const fileNameEl = document.getElementById('fileName');
  const sendBtn = document.getElementById('sendBtn');
  const sessionEl = document.getElementById('session');

  function renderSessionId() {
    sessionEl.textContent = sessionId ? `session: ${sessionId}` : '';
  }
  renderSessionId();

  fileInput.addEventListener('change', () => {
    fileNameEl.textContent = fileInput.files[0] ? fileInput.files[0].name : '';
  });

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function renderCards(container, toolUsed, data) {
    if (!data) return;
    const wrap = document.createElement('div');
    wrap.className = 'cards';

    if (toolUsed === 'search_employees' && Array.isArray(data.results)) {
      data.results.forEach(r => {
        const c = document.createElement('div');
        c.className = 'card';
        c.innerHTML = `<div class="name">${r.name} — ${r.businessScore}%</div>
          <div class="meta">${r.designation || ''} · ${r.department || ''} · ${r.experience ?? '?'} yrs · ${r.availability || ''}</div>`;
        wrap.appendChild(c);
      });
    } else if (toolUsed === 'ask_about_resumes' && Array.isArray(data.candidates)) {
      data.candidates.forEach(c0 => {
        const c = document.createElement('div');
        c.className = 'card';
        c.innerHTML = `<div class="name">${c0.name} — ${c0.matchScore}%</div>
          <div class="meta">${c0.matchedChunkCount} matched chunk(s)</div>`;
        wrap.appendChild(c);
      });
    } else if (toolUsed === 'requirement_document_analysis' && Array.isArray(data.matches)) {
      data.matches.forEach(m => {
        const c = document.createElement('div');
        c.className = 'card';
        c.innerHTML = `<div class="name">${m.role}</div>
          <div class="meta">${m.skills.join(', ')} · ${m.minExperience}+ yrs · ${m.matchedCount}/${m.count} ${m.sufficientResources ? '✓' : '⚠'}</div>`;
        wrap.appendChild(c);
      });
    }

    if (wrap.children.length > 0) container.appendChild(wrap);
  }

  async function sendTurn(message, file) {
    sendBtn.disabled = true;
    const pending = document.createElement('div');
    pending.className = 'pending';
    pending.textContent = 'Thinking…';
    messagesEl.appendChild(pending);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const formData = new FormData();
      if (sessionId) formData.append('sessionId', sessionId);
      if (message) formData.append('message', message);
      if (file) formData.append('document', file);

      const res = await fetch('/api/chat', { method: 'POST', body: formData });
      const body = await res.json();
      pending.remove();

      if (!res.ok) {
        addMessage('error', body.message || body.error || 'Something went wrong.');
        return;
      }

      sessionId = body.sessionId;
      localStorage.setItem(SESSION_KEY, sessionId);
      renderSessionId();

      const botMsg = addMessage('bot', body.reply);
      if (body.toolUsed) {
        const badge = document.createElement('div');
        badge.className = 'tool-badge';
        badge.textContent = body.toolUsed;
        botMsg.prepend(badge);
      }
      renderCards(botMsg, body.toolUsed, body.data);
    } catch (err) {
      pending.remove();
      addMessage('error', 'Network error: ' + err.message);
    } finally {
      sendBtn.disabled = false;
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const message = input.value.trim();
    const file = fileInput.files[0] || null;
    if (!message && !file) return;

    if (file) {
      addMessage('user', message || `📎 ${file.name}`);
    } else {
      addMessage('user', message);
    }

    sendTurn(message, file);
    input.value = '';
    fileInput.value = '';
    fileNameEl.textContent = '';
  });
</script>
</body>
</html>
