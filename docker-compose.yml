name: talentiq

services:
  chroma:
    # Official Chroma image. Pin an exact version before production use -
    # "latest" is fine for local/dev but not for reproducible deploys.
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      # The image's actual persist path is /data (confirmed via its own
      # startup log: "persist_path: /data") - NOT /chroma/chroma, which was
      # this file's original (wrong) guess. Mounting the wrong path meant
      # Chroma was writing to the container's ephemeral layer the whole
      # time; every redeploy silently wiped all indexed data, since the
      # actual persistent volume was never being touched at all.
      - chroma-data:/data
    networks:
      - talentiq-net

  backend-ai:
    build:
      context: .
      dockerfile: backend/ai/Dockerfile
    restart: unless-stopped
    depends_on:
      - chroma
    environment:
      CHROMA_URL: http://chroma:8000
      PORT: 3456
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
    volumes:
      - backend-data:/app/backend/ai/data
    networks:
      - talentiq-net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend-ai
    ports:
      - "80:80"
    networks:
      - talentiq-net

volumes:
  chroma-data:
  backend-data:

networks:
  talentiq-net:
    driver: bridge
