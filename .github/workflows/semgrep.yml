name: Semgrep SAST Scan

on:
  push:
    branches:
      - main
      - develop
      - release/*
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade semgrep

      - name: Semgrep Version
        run: |
          semgrep --version

      - name: Run Semgrep Scan
        run: |
          mkdir -p reports

          semgrep \
            --config auto \
            --exclude node_modules \
            --exclude dist \
            --exclude coverage \
            --sarif \
            --output reports/semgrep.sarif .

          semgrep \
            --config auto \
            --exclude node_modules \
            --exclude dist \
            --exclude coverage \
            --json \
            --output reports/semgrep.json .

      - name: Show Scan Summary
        run: |
          echo "Total Findings:"
          jq '.results | length' reports/semgrep.json

          echo ""
          echo "Semgrep Errors:"
          jq '.errors' reports/semgrep.json

          echo ""
          echo "First 10 Findings:"
          jq '.results[:10]' reports/semgrep.json

      - name: Install jq and wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y jq wkhtmltopdf

      - name: Generate HTML Report
        run: |
          cat <<EOF > report.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Semgrep Security Report</title>

            <style>

            body{
                font-family:Arial;
                margin:40px;
                background:#f5f5f5;
            }

            h1{
                color:#1565C0;
                text-align:center;
            }

            table{
                width:100%;
                border-collapse:collapse;
            }

            th{
                background:#1565C0;
                color:white;
                padding:10px;
            }

            td{
                border:1px solid #ccc;
                padding:8px;
            }

            tr:nth-child(even){
                background:#fafafa;
            }

            .summary{
                background:white;
                border:1px solid #ccc;
                padding:15px;
                margin-bottom:30px;
            }

            </style>

          </head>

          <body>

          <h1>Semgrep Security Scan Report</h1>

          <div class="summary">

          <b>Repository:</b> ${GITHUB_REPOSITORY}<br><br>

          <b>Branch:</b> ${GITHUB_REF_NAME}<br><br>

          <b>Commit:</b> ${GITHUB_SHA}<br><br>

          <b>Generated:</b> $(date)<br><br>

          <b>Total Findings:</b> $(jq '.results | length' reports/semgrep.json)

          </div>

          <table>

          <tr>
          <th>Severity</th>
          <th>Rule</th>
          <th>File</th>
          <th>Line</th>
          <th>Message</th>
          </tr>

          EOF

          if [ "$(jq '.results | length' reports/semgrep.json)" -eq 0 ]; then

            echo "<tr><td colspan='5' style='text-align:center;'>No findings detected.</td></tr>" >> report.html

          else

            jq -r '
            .results[] |
            "<tr><td>" +
            (.extra.severity // "INFO") +
            "</td><td>" +
            .check_id +
            "</td><td>" +
            .path +
            "</td><td>" +
            (.start.line|tostring) +
            "</td><td>" +
            (.extra.message|gsub("\n";"<br>")) +
            "</td></tr>"
            ' reports/semgrep.json >> report.html

          fi

          echo "</table></body></html>" >> report.html
      - name: Convert HTML to PDF
        run: |
          wkhtmltopdf \
            --page-size A4 \
            --margin-top 15 \
            --margin-bottom 15 \
            --margin-left 10 \
            --margin-right 10 \
            report.html reports/Semgrep_Report.pdf

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/semgrep.sarif

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            reports/semgrep.json
            reports/semgrep.sarif
            reports/Semgrep_Report.pdf
            report.html
