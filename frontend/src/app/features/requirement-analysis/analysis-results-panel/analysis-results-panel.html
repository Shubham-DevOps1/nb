<app-card class="panel">
  @if (analysisService.isLoading()) {
    <div class="state-centered">
      <span class="spinner"></span>
      <p class="state-text">Analyzing document…</p>
    </div>
  } @else if (analysisService.error(); as err) {
    <div class="state-centered">
      <app-empty-state icon="sparkles" title="Analysis failed" [subtitle]="err" />
    </div>
  } @else if (analysisService.result(); as result) {
    <div class="results">
      <div class="results__header">
        <h3 class="results__title">{{ result.sourceFile }}</h3>
        <span class="results__count">{{ result.requirementCount }} requirement(s) found</span>
      </div>

      @for (match of result.matches; track match.role) {
        <app-candidate-match-panel [match]="match" />
      }
    </div>
  } @else {
    <div class="state-centered">
      <app-empty-state
        icon="sparkles"
        title="Analysis results will appear here"
        subtitle="Upload a document to begin extraction"
      />
    </div>
  }
</app-card>
