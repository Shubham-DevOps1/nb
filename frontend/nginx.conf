server {
    listen 80;
    server_name _;

    # PDF uploads go through this proxy - default nginx limit (1M) is smaller
    # than the app's own 5MB cap, so raise it here or uploads get rejected by
    # nginx before ever reaching the backend.
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA - unmatched paths fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend-ai container. "backend-ai" is
    # resolved via Docker Compose's built-in service-name DNS - if this stack
    # is later moved to ECS, this hostname needs to match whatever service
    # discovery name (Cloud Map/Service Connect) the backend task registers.
    location /api/ {
        proxy_pass http://backend-ai:3456/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://backend-ai:3456/health;
    }
}
